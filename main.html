<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>流光·璃境 | 个人主页</title>
    <!-- 外部样式 & 字体 & 图标库 -->
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- 动态液态背景 (浮动渐变球体) -->
    <div class="bg-blob">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <!-- 主卡片：毛玻璃 + 液态玻璃效果 -->
    <div class="glass-card" id="glassCard">
        <!-- 液态高光跟随层 (鼠标交互增加流动感) -->
        <div class="liquid-highlight" id="liquidHighlight">
            <div class="highlight-spot" id="highlightSpot"></div>
        </div>

        <div class="card-content">
            <!-- 头像区 宇航员图标体现科技+液态光泽感 -->
            <div class="avatar">
                <i class="fas fa-user-astronaut"></i>
            </div>
            <!-- 姓名 -->
            <h1 class="name">Lumina Chen</h1>
            <!-- 职称 / 短标签 -->
            <div class="title">
                <i class="fas fa-gem" style="font-size: 0.75rem; margin-right: 6px;"></i> 液态界面设计师
            </div>
            <!-- 简介：突出简洁与流动美学 -->
            <p class="bio">
                探索数字流体的边界，融合毛玻璃的朦胧与液态玻璃的灵动。<br>
                用极简代码构筑沉浸式视觉体验，每一处光泽都经过细腻雕琢。
            </p>

            <!-- 社交链接 (液态玻璃悬浮按钮) -->
            <div class="social-links">
                <a href="#" class="social-icon" aria-label="GitHub" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon" aria-label="Dribbble" target="_blank"><i class="fab fa-dribbble"></i></a>
                <a href="#" class="social-icon" aria-label="Twitter" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-icon" aria-label="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-icon" aria-label="LinkedIn" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </div>

            <!-- 联系板块 (毛玻璃邮件) -->
            <div class="contact-info">
                <a href="mailto:lumina.chen@glasswave.me" class="contact-email">
                    <i class="far fa-envelope"></i> lumina.chen@glasswave.me
                </a>
                <a href="#" class="contact-email" style="gap: 5px;">
                    <i class="fas fa-palette"></i> 作品集
                </a>
            </div>

            <div class="footer-note">
                ✦ 液态玻璃 · 毛玻璃极简主义 ✦
            </div>
        </div>
    </div>

    <!-- 外部JS -->
    <script src="script.js"></script>
</body>
</html>
